<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Me&U</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background-color: #000; }

        /* 🌐 全局导航栏 */
        nav {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5%; box-sizing: border-box;
            z-index: 3000; /* 永远在最顶层 */
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: color 0.5s ease;
        }

        /* 导航栏颜色控制类 */
        nav.white-mode { color: white; }
        nav.black-mode { color: black; border-bottom: 1px solid rgba(0, 0, 0, 0.1); background: rgba(0, 0, 0, 0.05); }

        .nav-logo { font-size: 1.6em; font-weight: 900; letter-spacing: 1px; }
        .nav-links { display: flex; gap: 30px; }
        .nav-item { font-size: 1em; cursor: pointer; transition: 0.3s; opacity: 0.8; font-weight: bold; color: inherit; }
        .nav-item:hover { opacity: 1; text-shadow: 0 0 10px rgba(128,128,128,0.3); }

        /* 🏗️ 整体垂直容器 */
        #viewport {
            width: 100%; height: 100%;
            transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1);
        }

        /* 第一屏：封面滑动区 */
        #section-cover { width: 100%; height: 100vh; overflow: hidden; position: relative; }
        #slider { display: flex; width: 400vw; height: 100%; transition: transform 0.6s ease-in-out; }

        /* 第二屏：关于我们 */
        #section-about { 
            width: 100%; height: 100vh; 
            background: #fff; /* 关于我们背景为纯白，呼应黑色文字 */
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }

        /* 第三屏：倒计时页 */
        #section-timer { 
            width: 100%; height: 100vh; 
            background: url('bg.jpg') no-repeat center center fixed; background-size: cover;
            display: flex; align-items: center; justify-content: center;
        }

        .page { width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background-size: cover; background-position: center; position: relative; }
        .dot-mask::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(rgba(0,0,0,0.3) 1px, transparent 1.5px); background-size: 15px 15px; pointer-events: none; }

        /* 文字样式 */
        .intro-text { color: white; text-align: center; line-height: 1.3; letter-spacing: 2px; z-index: 103; padding: 0 30px; text-shadow: 0 4px 20px rgba(0,0,0,0.9); }
        .intro-text p { margin: 8px 0; font-size: 2.2em; font-weight: 900; }

        /* 关于我们文字 */
        .about-content { color: #333; text-align: center; }
        .about-content h2 { font-size: 2.5em; margin-bottom: 20px; }
        .about-content p { font-size: 1.2em; color: #666; }

        /* 提示小字 */
        .scroll-hint {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            font-size: 1.1em; color: #666; font-style: italic; opacity: 0.8;
        }

        /* 🔘 按钮与切换 */
        .nav-btn { position: absolute; top: 55%; transform: translateY(-50%); width: 60px; height: 60px; border: 2px solid white; border-radius: 15px; display: flex; align-items: center; justify-content: center; color: white; font-size: 2em; cursor: pointer; z-index: 110; transition: 0.3s; }
        .nav-btn:hover { background: rgba(255, 255, 255, 0.3); }
        .btn-left { left: 5%; } .btn-right { right: 5%; }

        .enter-btn { margin-top: 50px; padding: 15px 50px; background: rgba(255, 255, 255, 0.95); color: #4a7c44; border: none; border-radius: 50px; font-size: 1.4em; font-weight: bold; cursor: pointer; z-index: 105; transition: 0.3s; }

        /* 计时器容器 */
        .timer-container { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(15px); padding: 60px 50px; border-radius: 30px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.3); }
        #timer-val { font-size: 4.5em; font-weight: 900; margin: 20px 0; color: #fff; }
        .quote { font-size: 1.2em; color: black; font-weight: bold; margin-top: 30px; }

    </style>
</head>
<body class="white-mode">

    <nav id="main-nav" class="white-mode">
        <div class="nav-logo">Me&U</div>
        <div class="nav-links">
            <div class="nav-item" onclick="scrollToSection(2)">计时</div>
            <div class="nav-item" onclick="scrollToSection(1)">关于我们</div>
            <div class="nav-item">我眼中的魏依</div>
            <div class="nav-item">写给你和我</div>
            <div class="nav-item">我们的未来</div>
        </div>
    </nav>

    <div id="viewport">
        <section id="section-cover">
            <div id="slider">
                <div class="page dot-mask" style="background-image: url('grass.jpg');">
                    <div class="nav-btn btn-left" onclick="moveSlider(3)"> < </div>
                    <div class="nav-btn btn-right" onclick="moveSlider(1)"> > </div>
                    <div class="intro-text">
                        <p>人和人的遇见</p>
                        <p>就是一朵小小的涟漪 缓缓地散开</p>
                    </div>
                    <button class="enter-btn" onclick="scrollToSection(1)">先不要点我哦 ✨</button>
                </div>
                <div class="page dot-mask" style="background-image: url('friends.jpg');">
                    <div class="nav-btn btn-left" onclick="moveSlider(0)"> < </div>
                    <div class="nav-btn btn-right" onclick="moveSlider(2)"> > </div>
                    <div class="intro-text"><p>思考了很久给你的二十岁礼物</p></div>
                    <button class="enter-btn" onclick="scrollToSection(1)">也不要按我哦 ✨</button>
                </div>
                <div class="page dot-mask" style="background-image: url('heart.jpg');">
                    <div class="nav-btn btn-left" onclick="moveSlider(1)"> < </div>
                    <div class="nav-btn btn-right" onclick="moveSlider(3)"> > </div>
                    <div class="intro-text"><p>所以这个网站就这样诞生了！</p></div>
                    <button class="enter-btn" onclick="scrollToSection(1)">别着急点我哦 ✨</button>
                </div>
                <div class="page dot-mask" style="background-image: url('cake.jpg');">
                    <div class="nav-btn btn-left" onclick="moveSlider(2)"> < </div>
                    <div class="nav-btn btn-right" onclick="moveSlider(0)"> > </div>
                    <div class="intro-text"><p>20岁生日快乐</p></div>
                    <button class="enter-btn" onclick="scrollToSection(1)">请严肃点击我！✨</button>
                </div>
            </div>
        </section>

        <section id="section-about">
            <div class="about-content">
                <h2>关于我们</h2>
                <p>追溯过去的记忆</p>
                <p style="margin-top:20px; color:#999;">这里记录着魏依和刘若茜的点点滴滴...</p>
            </div>
            <div class="scroll-hint">（上下滑动可切换页面）</div>
        </section>

        <section id="section-timer">
            <div class="timer-container">
                <div style="font-size: 1.8em; font-weight: bold; color:white;">从认识到现在，我们已经共享了：</div>
                <div id="timer-val">加载中...</div>
                <p class="quote">“最好的友谊，就是各自忙乱，互相牵挂。”</p>
                <div class="scroll-hint" style="color:white; opacity:0.6;">（向上滑动返回）</div>
            </div>
        </section>
    </div>

    <script>
        let currentSection = 0;
        const viewport = document.getElementById('viewport');
        const nav = document.getElementById('main-nav');

        // 垂直切换逻辑
        function scrollToSection(index) {
            currentSection = index;
            viewport.style.transform = `translateY(-${index * 100}vh)`;
            
            // 切换导航栏颜色
            if(index === 1) {
                nav.className = 'black-mode';
            } else {
                nav.className = 'white-mode';
            }
        }

        // 滚轮监听：实现上下滑动切换
        window.addEventListener('wheel', (e) => {
            if (e.deltaY > 50 && currentSection < 2) scrollToSection(currentSection + 1);
            if (e.deltaY < -50 && currentSection > 0) scrollToSection(currentSection - 1);
        });

        // 水平滑动逻辑
        function moveSlider(index) {
            document.getElementById('slider').style.transform = `translateX(-${index * 100}vw)`;
        }

        // 计时逻辑
        const startDate = new Date(2009, 8, 1); 
        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('timer-val').innerText = days + " 天";
        }
        updateTimer();
        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
