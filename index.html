<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Me&U</title>
    <style>
        /* 基础样式 */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background-color: #000; }

        /* --- 启动页样式 --- */
        #welcome-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('grass.jpg') no-repeat center center; background-size: cover;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* 加深网点效果 */
        #welcome-page::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(0,0,0,0.3) 1px, transparent 1.5px);
            background-size: 15px 15px; pointer-events: none;
        }

        /* 🌟 漂浮的 Emoji */
        .star {
            position: absolute; font-size: 3em; animation: floatStar 5s infinite ease-in-out;
            opacity: 0.9; z-index: 102; pointer-events: none;
        }

        /* 📝 中央文字样式 */
        .intro-text {
            color: white;
            text-align: center;
            line-height: 2;
            letter-spacing: 2px;
            z-index: 103;
            padding: 0 20px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            animation: fadeInText 3s ease-in-out;
        }

        .intro-text p {
            margin: 10px 0;
            font-size: 1.4em;
            color: white !important;
        }

        @keyframes fadeInText {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes floatStar {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(15deg); }
        }

        /* 按钮样式 */
        .enter-btn {
            margin-top: 50px;
            padding: 12px 45px;
            background: rgba(255, 255, 255, 0.9); 
            color: #4a7c44; 
            border: none;
            border-radius: 50px; 
            font-size: 1.2em; 
            font-weight: bold;
            cursor: pointer; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            z-index: 105; 
            transition: 0.3s;
        }
        .enter-btn:hover { transform: scale(1.05); background: white; }

        /* --- 内容页样式 (第二页) --- */
        #main-content {
            height: 100vh; background: url('bg.jpg') no-repeat center center fixed;
            background-size: cover; display: flex; align-items: center; justify-content: center;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 40px; border-radius: 20px; color: white;
            max-width: 80%;
        }
        h1 { font-size: 2.8em; margin: 0; font-weight: 500; }
        #timer { font-size: 3.5em; font-weight: bold; margin: 25px 0; color: #ffffff; }
        .sub-text { font-size: 1.2em; color: #f5f5dc; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="welcome-page">
        <div class="star" style="top: 10%; left: 15%;">🌟</div>
        <div class="star" style="top: 15%; right: 10%; animation-delay: 1s;">🌟</div>
        <div class="star" style="top: 55%; left: 80%; animation-delay: 2s;">🌟</div>
        <div class="star" style="top: 80%; left: 10%; animation-delay: 0.5s;">🌟</div>
        <div class="star" style="top: 40%; left: 5%; animation-delay: 1.5s;">🌟</div>

        <div class="intro-text">
            <p>人和人的遇见 就是一朵小小的涟漪 缓缓地散开</p>
            <p>而我总认为 世界上那么多人 能和你相遇就是奇迹</p>
            <p>是我生命中最大的一朵涟漪</p>
        </div>
        
        <button class="enter-btn" onclick="enterSite()">开启友谊手册 ✨</button>
    </div>

    <div id="main-content">
        <div class="container">
            <h1>从认识到现在</h1>
            <div id="timer">计算中...</div>
            <p class="sub-text">我们共享了彼此生命中的</p>
            <p class="sub-text" style="margin-top: 20px; font-style: italic; opacity: 0.8;">“最好的友谊，就是各自忙乱，互相牵挂。”</p>
        </div>
    </div>

    <script>
        function enterSite() {
            document.getElementById('welcome-page').style.transform = 'translateY(-100%)';
        }

        // 认识日期：2009年9月1日
        // 注意：JavaScript中月份是从0开始的，所以9月要写成 8
        const startDate = new Date(2009, 8, 1); 
        
        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('timer').innerText = days + " 天";
        }

        updateTimer();
        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
